name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  modal:
    uses: ./.github/workflows/modal.yml
    secrets:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
    
  deploy:
    environment: tensara
    runs-on: ubuntu-latest
#    needs: modal

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github-actions
          hostname: gha-tensara-deploy-${{ github.run_id }}

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.AWS_SSH_PRIVATE_KEY }}
          SSH_USER: ${{ secrets.AWS_USER }}
        run: |
          mkdir -p ~/.ssh/
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H tensara-prod-aws-main >> ~/.ssh/known_hosts
          printf '%s\n' \
            'Host tensara-prod' \
            '  HostName tensara-prod-aws-main' \
            "  User ${SSH_USER:-ubuntu}" \
            '  IdentityFile ~/.ssh/deploy_key' \
            '  StrictHostKeyChecking yes' \
            > ~/.ssh/config

      - name: Run Deployment Script on AWS
        run: |
          ssh tensara-prod 'cd ~/code/tensara && chmod +x deploy.sh && ./deploy.sh'
