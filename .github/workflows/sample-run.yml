name: Sanity Check

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      sample_size:
        description: "Problems to sample (0 = all)"
        default: "2"
        required: false
      problems:
        description: "Specific slugs (comma-separated), overrides sample_size"
        default: ""
        required: false
      gpu_type:
        description: "GPU type"
        default: "H100"
        required: false
        type: choice
        options: [T4, A100, H100]

jobs:
  sanity-check:
    name: "Sanity Check (${{ github.event.inputs.gpu_type || 'H100' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: tensara

    steps:
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install requests modal "fastapi[standard]" torch numpy

      # ── Node / pnpm ───────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install Node deps
        run: pnpm install

      # ── Start Modal serve (engine from this PR branch) ────────────────────
      - name: Start Modal serve
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          cd engine
          modal serve api.py > /tmp/modal.log 2>&1 &
          echo "MODAL_PID=$!" >> $GITHUB_ENV
          sleep 10
      
      # ── Start Next.js dev server ──────────────────────────────────────────
      - name: Start Next.js dev server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_ID }}
          AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_SECRET }}
          MODAL_ENDPOINT: ${{ secrets.MODAL_LOCAL_ENDPOINT }}
          NEXT_PUBLIC_GA_ID: "PLACEHOLDER"
          NEXT_PUBLIC_BASE_URL: "http://localhost:3000"
          NEXTAUTH_URL: "http://localhost:3000"
        run: |
          pnpm dev > /tmp/nextjs.log 2>&1 &
          echo "NEXTJS_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 12); do
            sleep 5
            if curl -sf http://localhost:3000 > /dev/null 2>&1; then
              echo "Next.js is up"
              exit 0
            fi
          done
          cat /tmp/nextjs.log
          exit 1

      # ── Run the sanity check against localhost ────────────────────────────
      - name: Run sanity check
        env:
          TENSARA_CI_API_KEY: ${{ secrets.CI_KEY }}
          TENSARA_URL: "http://localhost:3000"
          CI_GPU_TYPE: ${{ github.event.inputs.gpu_type || 'H100' }}
          CI_SAMPLE_SIZE: ${{ github.event.inputs.sample_size || (github.event_name == 'pull_request' && '2' || '0') }}
          CI_PROBLEMS: ${{ github.event.inputs.problems || '' }}
          CI_TIMEOUT_SECONDS: "300"
        run: python testing/sanity_check.py

      # ── Logs on failure ───────────────────────────────────────────────────
      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Modal logs ===" && cat /tmp/modal.log || true
          echo "=== Next.js logs ===" && cat /tmp/nextjs.log || true

      # ── Cleanup ───────────────────────────────────────────────────────────
      - name: Stop background processes
        if: always()
        run: |
          [ -n "$MODAL_PID" ] && kill $MODAL_PID 2>/dev/null || true
          [ -n "$NEXTJS_PID" ] && kill $NEXTJS_PID 2>/dev/null || true

      # ── Job summary ───────────────────────────────────────────────────────
      - name: Write job summary
        if: always()
        run: |
          echo "## Sanity Check" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Trigger | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| GPU | \`${{ github.event.inputs.gpu_type || 'H100' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.head_ref || github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
